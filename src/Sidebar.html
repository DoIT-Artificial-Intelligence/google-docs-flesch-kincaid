<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: 'Arial', sans-serif;
        padding: 20px;
        color: #3c4043;
      }
      .container {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .stat-card {
        background-color: #f8f9fa;
        border: 1px solid #dadce0;
        border-radius: 8px;
        padding: 15px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .traffic-light {
        height: 6px;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background-color: #dadce0;
      }
      .grade-value {
        font-size: 32px;
        font-weight: bold;
        color: #1a73e8;
        margin: 10px 0;
      }
      .label {
        font-size: 14px;
        color: #5f6368;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .readability-status {
        font-weight: 600;
        font-size: 16px;
        margin-bottom: 5px;
      }
      .details {
        font-size: 13px;
        color: #70757a;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 10px;
      }
      .btn {
        background-color: #1a73e8;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 500;
        margin-top: 10px;
      }
      .btn:hover {
        background-color: #1765cc;
      }
      .loading {
        font-style: italic;
        color: #5f6368;
        font-size: 12px;
      }
      
      /* Traffic Light Colors */
      .bg-great { background-color: #009900; } /* Green */
      .bg-ok { background-color: #e6b800; }    /* Yellow/Orange */
      .bg-hard { background-color: #cc0000; }  /* Red */
      
      .text-great { color: #009900; }
      .text-ok { color: #e6b800; }
      .text-hard { color: #cc0000; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="stat-card">
        <div id="color-bar" class="traffic-light"></div>
        <div class="label">Readability</div>
        <div id="grade" class="grade-value">--</div>
        <div id="grade-label" class="readability-status"></div>
        <div id="status" class="loading">Click Refresh to calculate</div>
      </div>
      
      <div class="stat-card" style="text-align: left;">
        <div class="label">Breakdown</div>
        <div class="details">
          <span>Words:</span> <strong id="words">0</strong>
          <span>Sentences:</span> <strong id="sentences">0</strong>
          <span>Syllables:</span> <strong id="syllables">0</strong>
        </div>
      </div>

      <button class="btn" onclick="updateStats()">Refresh Stats</button>
    </div>

    <script>
      function updateStats() {
        const statusEl = document.getElementById('status');
        statusEl.innerText = 'Calculating...';
        
        google.script.run
          .withSuccessHandler(function(stats) {
            const grade = parseFloat(stats.gradeLevel);
            const gradeEl = document.getElementById('grade');
            const labelEl = document.getElementById('grade-label');
            const barEl = document.getElementById('color-bar');
            
            gradeEl.innerText = 'Grade ' + stats.gradeLevel;
            
            // Apply traffic light pattern
            barEl.className = 'traffic-light';
            labelEl.className = 'readability-status';
            
            if (grade <= 9) {
              barEl.classList.add('bg-great');
              labelEl.classList.add('text-great');
              labelEl.innerText = 'Great';
            } else if (grade <= 10) {
              barEl.classList.add('bg-ok');
              labelEl.classList.add('text-ok');
              labelEl.innerText = 'OK';
            } else {
              barEl.classList.add('bg-hard');
              labelEl.classList.add('text-hard');
              labelEl.innerText = 'Hard to read';
            }

            document.getElementById('words').innerText = stats.wordCount;
            document.getElementById('sentences').innerText = stats.sentenceCount;
            document.getElementById('syllables').innerText = stats.syllableCount;
            statusEl.innerText = 'Updated just now';
          })
          .withFailureHandler(function(err) {
            statusEl.innerText = 'Error: ' + err.message;
          })
          .calculateStats();
      }

      window.onload = updateStats;
    </script>
  </body>
</html>
